name: Mihomo Rules Update

# 每天 UTC 时间 20:00 运行 (相当于北京时间次日 04:00)
on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *' 

permissions:
  contents: write  
  pull-requests: write 

env:
  MIHOMO_OWNER: MetaCubeX
  MIHOMO_REPO: mihomo
  REMOTE_RULES_URL: https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.yaml
  REMOTE_RULES_MRS_FILE: mrs/AWAvenue-Ads-Rule.mrs
  
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4
        with:
          # 需要完整的 Git 历史来获取提交时间
          fetch-depth: 0 

      # --- 1. 安装 Mihomo ---
      - name: 🔍 Get Latest Mihomo Release Tag
        id: get-version
        run: |
          LATEST_TAG=$(curl -s "https://api.github.com/repos/${{ env.MIHOMO_OWNER }}/${{ env.MIHOMO_REPO }}/releases/latest" | jq -r .tag_name)
          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" == "null" ]; then
            echo "::error::Failed to retrieve latest Mihomo tag from GitHub API."
            exit 1
          fi
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
        
      - name: ⚙️ Setup Mihomo Cache
        id: cache-mihomo
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/mihomo
          key: ${{ runner.os }}-mihomo-${{ env.LATEST_TAG }} 
          
      - name: 📥 Download, Unzip, and Install Mihomo
        if: steps.cache-mihomo.outputs.cache-hit != 'true'
        run: |
          MIHOMO_VERSION="${{ env.LATEST_TAG }}"
          FILE_NAME="mihomo-linux-amd64-${MIHOMO_VERSION}.gz" 
          MIHOMO_URL="https://github.com/${{ env.MIHOMO_OWNER }}/${{ env.MIHOMO_REPO }}/releases/download/${MIHOMO_VERSION}/${FILE_NAME}"
          TEMP_FILE="mihomo_temp.gz"
          EXEC_FILE="mihomo_temp"
          curl -fsSL -o "${TEMP_FILE}" "${MIHOMO_URL}" || exit 1
          gunzip "${TEMP_FILE}" || exit 1
          chmod +x "${EXEC_FILE}"
          sudo mv "${EXEC_FILE}" /usr/local/bin/mihomo
          
      - name: 🔍 Verify Mihomo Installation
        run: mihomo -v

      - name: 📂 Create Output Directory
        run: mkdir -p mrs

      # --- 2. 处理本地 rules 规则文件 (基于最后提交时间) ---
      - name: 🛠️ Convert Local Rules to MRS (Use Last Commit Time)
        run: |
          echo "Starting local rules conversion..."
          TEMP_DIR=$(mktemp -d)
          
          if [ ! -d "rules" ]; then
              echo "Rules directory not found. Skipping local rules conversion."
              exit 0
          fi
          
          find rules -type f -name "*.list" | while read -r file; do
            filename=$(basename "$file" .list)
            mrs_file="mrs/${filename}.mrs"
            temp_list="${TEMP_DIR}/${filename}.list.tmp"
            
            # 1. 获取输入规则文件的最后提交时间 (%at: Author date, Unix timestamp)
            INPUT_COMMIT_TIME=$(git log -1 --format=%at -- "$file" 2>/dev/null || echo 0)
            
            # 2. 获取输出 MRS 文件的最后提交时间 (如果文件不存在，则时间为 0)
            if [ -f "$mrs_file" ]; then
                MRS_COMMIT_TIME=$(git log -1 --format=%at -- "$mrs_file" 2>/dev/null || echo 0)
            else
                MRS_COMMIT_TIME=0
            fi

            echo "  -> ${file} Commit Time: ${INPUT_COMMIT_TIME}"
            echo "  -> ${mrs_file} Commit Time: ${MRS_COMMIT_TIME}"
            
            # 3. 判断是否需要转换
            if [ "$INPUT_COMMIT_TIME" -gt "$MRS_COMMIT_TIME" ] || [ "$MRS_COMMIT_TIME" -eq 0 ]; then
                SHOULD_CONVERT="true"
                echo "  - **Action:** Converting (Input is newer or MRS missing)."
            else
                SHOULD_CONVERT="false"
                echo "  - Skipping (MRS is up-to-date): ${file}"
            fi
            
            if [ "$SHOULD_CONVERT" == "false" ]; then
                continue
            fi
            
            # 4. 判断文件类型并设置 behavior
            if [[ "$file" == *"_domain.list" ]]; then
              BEHAVIOR="domain"
            elif [[ "$file" == *"_ip.list" ]]; then
              BEHAVIOR="ipcidr"
            else
              echo "  - Skipping file (unknown type, must contain _domain.list or _ip.list): ${file}"
              continue
            fi
            
            # 5. 预清理：去除注释和空行，并写入临时文件
            grep -v '^[[:space:]]*[#;]' "$file" | \
            grep -v '^[[:space:]]*$' | \
            sed 's/[[:space:]]*[#;].*//' > "$temp_list"
            
            # 6. 检查临时文件是否为空 (避免 panic: empty rule)
            if [ ! -s "$temp_list" ]; then
              echo "  - **Skipping file (Empty/Only Comments):** ${file}"
              [ -f "$mrs_file" ] && rm "$mrs_file"
              rm "$temp_list" 
              continue
            fi
            
            echo "  - Executing conversion to ${mrs_file}"

            # 7. 转换：使用临时文件作为输入 (已修复 open - 错误)
            /usr/local/bin/mihomo convert-ruleset ${BEHAVIOR} text "$temp_list" "$mrs_file"
            echo "Converted successfully."
            
            # 8. 清理本次循环的临时文件
            rm "$temp_list"
          done
          echo "Local rules conversion complete."
          
          rm -rf "$TEMP_DIR"

      # ----------------------------------------------------------------------------------------------------------------------------------------------------------------
      # --- 新增步骤：处理 process 目录下的 .txt 文件 (生成 .list 文件) ---
      # ----------------------------------------------------------------------------------------------------------------------------------------------------------------
      - name: 🛠️ Process TXT Files and Generate LIST
        run: |
          echo "Starting process directory file cleanup and generation..."
          
          if [ ! -d "process" ]; then
              echo "Process directory not found. Skipping file generation."
              exit 0
          fi
          
          find process -type f -name "*.txt" | while read -r input_file; do
            filename_base=$(basename "$input_file" .txt)
            output_file="process/${filename_base}.list"
            
            # 1. 获取输入 .txt 文件的最后提交时间
            INPUT_COMMIT_TIME=$(git log -1 --format=%at -- "$input_file" 2>/dev/null || echo 0)
            
            # 2. 获取输出 .list 文件的最后提交时间 (如果文件不存在，则时间为 0)
            if [ -f "$output_file" ]; then
                OUTPUT_COMMIT_TIME=$(git log -1 --format=%at -- "$output_file" 2>/dev/null || echo 0)
            else
                OUTPUT_COMMIT_TIME=0
            fi

            echo "  -> ${input_file} Commit Time: ${INPUT_COMMIT_TIME}"
            echo "  -> ${output_file} Commit Time: ${OUTPUT_COMMIT_TIME}"
            
            # 3. 判断是否需要处理/生成
            if [ "$INPUT_COMMIT_TIME" -gt "$OUTPUT_COMMIT_TIME" ] || [ "$OUTPUT_COMMIT_TIME" -eq 0 ]; then
                SHOULD_PROCESS="true"
                echo "  - **Action:** Processing (Input .txt is newer or .list missing)."
            else
                SHOULD_PROCESS="false"
                echo "  - Skipping (.list is up-to-date): ${input_file}"
            fi
            
            if [ "$SHOULD_PROCESS" == "false" ]; then
                continue
            fi
            
            # 4. 内容处理逻辑：去除注释、空行、多余空格
            echo "  - Cleaning and generating ${output_file}"
            
            # 清理步骤：
            # 1. grep -v '^[[:space:]]*[#;]'：移除以 # 或 ; 开头（包括前面空格）的行
            # 2. sed 's/[[:space:]]*[#;].*//'：移除行内 # 或 ; 及其后的所有内容
            # 3. sed 's/^[[:space:]]*//; s/[[:space:]]*$//'：清理行首和行尾的多余空格
            # 4. grep -v '^[[:space:]]*$'：移除清理后产生的空行
            
            grep -v '^[[:space:]]*[#;]' "$input_file" | \
            sed 's/[[:space:]]*[#;].*//' | \
            sed 's/^[[:space:]]*//; s/[[:space:]]*$//' | \
            grep -v '^[[:space:]]*$' > "$output_file"
            
            # 检查输出文件是否为空
            if [ ! -s "$output_file" ]; then
              echo "  - **Warning:** Generated .list file is empty. Removing: ${output_file}"
              [ -f "$output_file" ] && rm "$output_file" # 确保如果文件被创建但为空则移除
            else
              echo "Generated successfully."
            fi
            
          done
          echo "Process directory file generation complete."
      # ----------------------------------------------------------------------------------------------------------------------------------------------------------------
      
      # --- 3. 处理远程 YAML 规则集 (引入版本检测及缓存) ---
      - name: 💾 Get Remote Rules Previous Version
        id: cache-remote-version
        uses: actions/cache@v4
        with:
          path: remote-version.txt
          key: remote-rules-version-${{ hashFiles('remote-version.txt') }}
          restore-keys: |
            remote-rules-version-

      - name: 🌐 Download and Check Remote RuleSet Version
        id: remote-check
        run: |
          echo "Downloading remote RuleSet from: ${{ env.REMOTE_RULES_URL }}"
          curl -L -o remote-rule.yaml "${{ env.REMOTE_RULES_URL }}"
          
          # 提取当前下载规则的版本号 (#Version: X.X.X)
          CURRENT_VERSION=$(grep '^[[:space:]]*#Version:' remote-rule.yaml | head -n 1 | sed 's/^[[:space:]]*#Version:[[:space:]]*//')
          
          if [ -z "$CURRENT_VERSION" ]; then
            echo "::warning::Could not find Version tag in remote YAML file. Forcing conversion."
            CURRENT_VERSION="FORCE_CONVERT_$(date +%s)"
          fi

          echo "Current Remote Version: $CURRENT_VERSION"
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
          
          if [ -f "remote-version.txt" ]; then
            OLD_VERSION=$(cat remote-version.txt)
          else
            OLD_VERSION=""
          fi

          echo "Previous Remote Version: ${OLD_VERSION:-N/A (First Run)}"
          
          if [ "$CURRENT_VERSION" == "$OLD_VERSION" ]; then
            echo "Remote rule version is unchanged. Skipping conversion."
            echo "SHOULD_CONVERT_REMOTE=false" >> $GITHUB_ENV
          else
            echo "Remote rule version updated (${OLD_VERSION} -> ${CURRENT_VERSION}). Converting."
            echo "SHOULD_CONVERT_REMOTE=true" >> $GITHUB_ENV
            # 准备写入新的版本号，供缓存使用
            echo "$CURRENT_VERSION" > remote-version.txt
          fi

      - name: 🔄 Convert Remote RuleSet to MRS
        if: env.SHOULD_CONVERT_REMOTE == 'true'
        run: |
          echo "Converting remote RuleSet using 'mihomo convert-ruleset'..."
          # 远程文件是 domain yaml 格式
          /usr/local/bin/mihomo convert-ruleset domain yaml remote-rule.yaml ${{ env.REMOTE_RULES_MRS_FILE }}
          echo "Remote RuleSet conversion complete."
      
      # 💾 Save Remote Rules New Version to Cache 
      - name: 💾 Save Remote Rules New Version Cache
        uses: actions/cache/save@v4
        # 只有在转换成功且执行了新版本转换时才保存
        if: success() && env.SHOULD_CONVERT_REMOTE == 'true'
        with:
          path: remote-version.txt
          key: remote-rules-version-${{ hashFiles('remote-version.txt') }}

      # --- 4. 提交更改回仓库 ---
      - name: ⬆️ Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Feat: Update Mihomo MRS and Processed Rules (v${{ env.CURRENT_VERSION }})"
          branch: ${{ github.ref_name }}
          # 提交 mrs 目录下所有文件 和 process 目录下所有 .list 文件
          file_pattern: 'mrs/* process/*.list' 
          commit_options: '--allow-empty --no-edit'
